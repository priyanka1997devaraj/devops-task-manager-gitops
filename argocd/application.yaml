apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: devops-task-manager
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/priyanka1997devaraj/devops-task-manager-gitops
    targetRevision: HEAD
    path: helm
    helm:
      valueFiles:
        - values.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: production
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
